name: Checks

env:
    # DEPENDENCY SWITCH:
    flatland-baselines-ref: main
    flatland-benchmarks-episodes-url: "https://github.com/flatland-association/flatland-scenarios/raw/refs/heads/main/trajectories/FLATLAND_BENCHMARK_EPISODES_FOLDER_v5.zip"
    flatland-scenarios-olten-partially-closed-url: "https://github.com/flatland-association/flatland-scenarios/raw/refs/heads/main/scenario_olten/data/OLTEN_PARTIALLY_CLOSED_v2.zip"
    ecml2026-pkl: "https://github.com/flatland-association/ecml2026-starterkit/raw/refs/heads/main/reinforcement_learning/sampling/level_0_scenario_1.pkl"
    ecml2026-stations-pkl: "https://github.com/flatland-association/ecml2026-starterkit/raw/refs/heads/main/reinforcement_learning/sampling/stations.pkl"

on:
    workflow_dispatch:
        inputs:
            run_benchmarks:
                type: boolean
    pull_request:
    push:
        branches: [ "main" ]
    schedule:
        -   cron: '30 5 * * *'
concurrency:
    group: ${{ github.head_ref || github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        if: ${{ false }}  # disabled for now, hasn't run in a while resulting in countless issues
        runs-on: ubuntu-22.04
        steps:
            -   uses: actions/checkout@v6
            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v6
                with:
                    python-version: "3.13"
            -   name: Install tox
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install tox tox-gh-actions
            -   name: Run lint checks
                run: tox run -e flake8

    deptry:
        runs-on: ubuntu-22.04
        strategy:
            fail-fast: false
            matrix:
                python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        steps:
            -   name: Inspect disk
                run: |
                    df -h
                    docker system df
            # https://stackoverflow.com/questions/30604846/docker-complains-about-no-space-left-on-device-how-to-clean-up
            -   name: Prune docker system
                run: |
                    docker system prune --all --force
            # https://www.dzombak.com/blog/2024/09/freeing-disk-space-on-github-actions-runners/
            -   name: Free disk space
                run: |
                    curl -fsSL https://raw.githubusercontent.com/kou/arrow/e49d8ae15583ceff03237571569099a6ad62be32/ci/scripts/util_free_space.sh | bash
            -   name: Inspect disk again
                run: |
                    df -h
                    docker system df
            -   uses: actions/checkout@v6
            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v6
                with:
                    python-version: ${{ matrix.python-version }}
            -   name: Install tox
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install tox tox-gh-actions
            -   name: Run deptry
                run: tox -e py${{ matrix.python-version }}-verify-requirements

    testml:
        runs-on: ubuntu-22.04
        strategy:
            fail-fast: false
            matrix:
                python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        steps:
            -   name: Inspect disk
                run: |
                    df -h
                    docker system df
            # https://stackoverflow.com/questions/30604846/docker-complains-about-no-space-left-on-device-how-to-clean-up
            -   name: Prune docker system
                run: |
                    docker system prune --all --force
            # https://www.dzombak.com/blog/2024/09/freeing-disk-space-on-github-actions-runners/
            -   name: Free disk space
                run: |
                    curl -fsSL https://raw.githubusercontent.com/kou/arrow/e49d8ae15583ceff03237571569099a6ad62be32/ci/scripts/util_free_space.sh | bash
            -   name: Inspect disk again
                run: |
                    df -h
                    docker system df
            -   name: Install ffmpeg
                run: |
                    sudo apt-get update
                    sudo apt-get -y install ffmpeg
            -   uses: actions/checkout@v6
            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v6
                with:
                    python-version: ${{ matrix.python-version }}
            -   name: Download episodes
                run: |
                    wget "${{ env.flatland-benchmarks-episodes-url }}" -O FLATLAND_BENCHMARK_EPISODES_FOLDER.zip
                    mkdir -p episodes
                    unzip FLATLAND_BENCHMARK_EPISODES_FOLDER -d episodes
            -   name: Install tox
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install tox tox-gh-actions
            -   name: Run tests
                run: tox run -e py${{ matrix.python-version }}-ml
            -   name: Check disk space
                run: df . -h

    test:
        runs-on: ubuntu-22.04
        strategy:
            fail-fast: false
            matrix:
                python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        steps:
            -   name: Inspect disk
                run: |
                    df -h
                    docker system df
            # https://stackoverflow.com/questions/30604846/docker-complains-about-no-space-left-on-device-how-to-clean-up
            -   name: Prune docker system
                run: |
                    docker system prune --all --force
            # https://www.dzombak.com/blog/2024/09/freeing-disk-space-on-github-actions-runners/
            -   name: Free disk space
                run: |
                    curl -fsSL https://raw.githubusercontent.com/kou/arrow/e49d8ae15583ceff03237571569099a6ad62be32/ci/scripts/util_free_space.sh | bash
            -   name: Inspect disk again
                run: |
                    df -h
                    docker system df
            -   name: Install ffmpeg
                run: |
                    sudo apt-get update
                    sudo apt-get -y install ffmpeg
            -   uses: actions/checkout@v6
            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v6
                with:
                    python-version: ${{ matrix.python-version }}
            -   name: Download episodes
                run: |
                    wget "${{ env.flatland-benchmarks-episodes-url }}" -O FLATLAND_BENCHMARK_EPISODES_FOLDER.zip
                    mkdir -p episodes
                    unzip FLATLAND_BENCHMARK_EPISODES_FOLDER -d episodes
            -   name: Clone flatland-baselines
                uses: actions/checkout@v6
                with:
                    repository: flatland-association/flatland-baselines
                    ref: ${{ env.flatland-baselines-ref }}
                    path: flatland-baselines
            -   name: Install tox
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install tox tox-gh-actions
            -   name: Run tests
                run: tox -e py${{ matrix.python-version }},py${{ matrix.python-version }}-verify-install
            -   name: Check disk space
                run: df . -h

    notebooks:
        runs-on: ubuntu-22.04
        strategy:
            fail-fast: false
            matrix:
                python-version: [
                  # "3.10", # commented out as failing too often
                    "3.11", "3.12", "3.13" ]
        steps:
            -   uses: actions/checkout@v6
            -   name: Install ffmpeg
                run: |
                    sudo apt-get update
                    sudo apt-get -y install ffmpeg
            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v6
                with:
                    python-version: ${{ matrix.python-version }}
            -   name: Start Redis
                uses: supercharge/redis-github-action@1.8.1
                with:
                    redis-version: 7.4.2
                    redis-port: 6379
            -   name: Install tox
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install tox tox-gh-actions
            -   name: Run notebooks
                run: |
                    tox run -e py${{ matrix.python-version }}-notebooks
                    tox run -e py${{ matrix.python-version }}-notebooks-no-pickle

    examples:
        runs-on: ubuntu-22.04
        strategy:
            fail-fast: false
            matrix:
                python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        steps:
            -   uses: actions/checkout@v6
            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v6
                with:
                    python-version: ${{ matrix.python-version }}
            -   name: Download Olten scenario
                run: |
                    wget "${{ env.flatland-scenarios-olten-partially-closed-url }}" -O OLTEN_PARTIALLY_CLOSED_v2.zip
                    mkdir -p scenarios/scenario_olten/data
                    unzip OLTEN_PARTIALLY_CLOSED_v2 -d scenarios/scenario_olten/data
            -   name: Install tox
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install tox tox-gh-actions
            -   name: Run examples
                run: tox run -e py${{ matrix.python-version }}-examples

    profiling:
        runs-on: ubuntu-22.04
        permissions:
            contents: read
            pull-requests: write
        strategy:
            fail-fast: false
            matrix:
                python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        steps:
            -   uses: actions/checkout@v6
            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v6
                with:
                    python-version: ${{ matrix.python-version }}
            -   name: Download Olten scenario
                run: |
                    wget "${{ env.flatland-scenarios-olten-partially-closed-url }}" -O OLTEN_PARTIALLY_CLOSED_v2.zip
                    mkdir -p scenarios/scenario_olten/data
                    unzip OLTEN_PARTIALLY_CLOSED_v2 -d scenarios/scenario_olten/data
            -   name: Install tox
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install tox tox-gh-actions
            -   name: Run profiling
                run: tox run -e py${{ matrix.python-version }}-profiling
            -   uses: actions/upload-artifact@v6
                with:
                    name: upload-profiling-results-${{ matrix.python-version }}
                    path: .tox/py${{ matrix.python-version }}-profiling/log
                    if-no-files-found: error
            -   uses: actions/upload-artifact@v6
                with:
                    name: upload-performance-profiling-results-${{ matrix.python-version }}
                    path: |
                        benchmarks/*.prof
                        benchmarks/*.png
                    if-no-files-found: error
            # Only python 3.12 publishes to a gist and comments on the PR - no need to repeat the same
            # picture for every matrix entry. Restricted to same-repo PRs since forks don't receive secrets
            # (GIST_TOKEN below), so the gist/comment steps would just fail auth on a fork PR.
            -   name: Find existing profiling comment
                if: >-
                    ${{ github.event_name == 'pull_request' && matrix.python-version == '3.12' &&
                    github.event.pull_request.head.repo.full_name == github.repository }}
                id: find-comment
                uses: peter-evans/find-comment@v3
                with:
                    issue-number: ${{ github.event.pull_request.number }}
                    comment-author: 'github-actions[bot]'
                    body-includes: <!-- flatland-ci-profiling-overall -->
            -   name: Create or update gist with overall profiling result
                if: >-
                    ${{ github.event_name == 'pull_request' && matrix.python-version == '3.12' &&
                    github.event.pull_request.head.repo.full_name == github.repository }}
                id: gist
                env:
                    # Classic PAT with the `gist` scope, owned by the account that owns the shared gist below
                    # (only the gist's owner can push updates to it - gists have no collaborator model). The
                    # default GITHUB_TOKEN can't be used here at all: it's a repo-scoped GitHub App
                    # installation token (contents, issues, pull-requests, etc.), and gists are a
                    # user-account-level resource with no corresponding repo permission to grant it - a
                    # fine-grained PAT won't work either, as fine-grained tokens don't cover gists.
                    GH_TOKEN: ${{ secrets.GIST_TOKEN }}
                    # One gist shared by both profiling jobs, across every PR:
                    # https://gist.github.com/flatland-competition/6f2b1d5d6e3ee80f57edab68215a05ef
                    GIST_ID: 6f2b1d5d6e3ee80f57edab68215a05ef
                    PR_SHA: ${{ github.event.pull_request.head.sha }}
                run: |
                    short_sha=${PR_SHA:0:7}
                    # Named per PR only (not per commit) - the PR number already disambiguates within the
                    # shared gist, so each new commit on a PR safely overwrites that PR's own file.
                    filename="pr${{ github.event.pull_request.number }}_performance_overall.png"
                    # `gh gist create` rejects binary files outright, and the gists API's `content` field is
                    # text-only - so we go through git directly (a gist is just a git repo under the hood,
                    # which accepts binary content fine).
                    git clone "https://$GH_TOKEN@gist.github.com/$GIST_ID.git" gist_dir
                    # gist.github.com redirects the clone URL (e.g. to add a trailing slash), and git drops
                    # the embedded token from the remote URL when it follows that redirect - so re-embed it
                    # before pushing, otherwise push fails non-interactively ("could not read Username").
                    git -C gist_dir remote set-url origin "https://$GH_TOKEN@gist.github.com/$GIST_ID.git"
                    cp benchmarks/performance_overall.png "gist_dir/$filename"
                    git -C gist_dir -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
                        add "$filename"
                    git -C gist_dir -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
                        commit --allow-empty -m "Add profiling png for PR #${{ github.event.pull_request.number }}, $PR_SHA"
                    git -C gist_dir push
                    raw_url=$(gh api "gists/$GIST_ID" --jq ".files[\"$filename\"].raw_url")
                    echo "url=https://gist.github.com/$GIST_ID" >> "$GITHUB_OUTPUT"
                    echo "raw_url=$raw_url" >> "$GITHUB_OUTPUT"
                    echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
            -   name: Create or update profiling comment
                if: >-
                    ${{ github.event_name == 'pull_request' && matrix.python-version == '3.12' &&
                    github.event.pull_request.head.repo.full_name == github.repository }}
                uses: peter-evans/create-or-update-comment@v4
                with:
                    comment-id: ${{ steps.find-comment.outputs.comment-id }}
                    issue-number: ${{ github.event.pull_request.number }}
                    edit-mode: replace
                    body: |
                        <!-- flatland-ci-profiling-overall -->
                        ### 📈 Performance profiling (Python 3.12) — commit [`${{ steps.gist.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})

                        ![performance overall](${{ steps.gist.outputs.raw_url }})

                        _Updated by [this workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · [gist](${{ steps.gist.outputs.url }})._

    profiling-get-k-shortest-paths:
        runs-on: ubuntu-22.04
        permissions:
            contents: read
            pull-requests: write
        strategy:
            fail-fast: false
            matrix:
                python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        steps:
            -   uses: actions/checkout@v6
            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v6
                with:
                    python-version: ${{ matrix.python-version }}
            -   name: Download ecml2026 scenario
                run: |
                    wget "${{ env.ecml2026-pkl }}" -O level_0_scenario_1.pkl
                    wget "${{ env.ecml2026-stations-pkl }}" -O stations.pkl
                working-directory: ${{ github.workspace }}
            -   name: Install tox
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install tox tox-gh-actions
            -   name: Run profiling
                run: tox run -e py${{ matrix.python-version }}-profiling-get-k-shortest-paths
            -   uses: actions/upload-artifact@v6
                with:
                    name: upload-profiling-get-k-shortest-paths-results-${{ matrix.python-version }}
                    path: |
                        benchmarks/*.prof
                        benchmarks/*.png
                    if-no-files-found: error
            # See the `profiling` job above for why this is gated to python 3.12 and same-repo PRs only.
            -   name: Find existing get_k_shortest_paths profiling comment
                if: >-
                    ${{ github.event_name == 'pull_request' && matrix.python-version == '3.12' &&
                    github.event.pull_request.head.repo.full_name == github.repository }}
                id: find-comment
                uses: peter-evans/find-comment@v3
                with:
                    issue-number: ${{ github.event.pull_request.number }}
                    comment-author: 'github-actions[bot]'
                    body-includes: <!-- flatland-ci-profiling-get-k-shortest-paths -->
            -   name: Create or update gist with get_k_shortest_paths profiling result
                if: >-
                    ${{ github.event_name == 'pull_request' && matrix.python-version == '3.12' &&
                    github.event.pull_request.head.repo.full_name == github.repository }}
                id: gist
                env:
                    # Classic PAT with the `gist` scope, owned by the account that owns the shared gist below
                    # (only the gist's owner can push updates to it - gists have no collaborator model). The
                    # default GITHUB_TOKEN can't be used here at all: it's a repo-scoped GitHub App
                    # installation token (contents, issues, pull-requests, etc.), and gists are a
                    # user-account-level resource with no corresponding repo permission to grant it - a
                    # fine-grained PAT won't work either, as fine-grained tokens don't cover gists.
                    GH_TOKEN: ${{ secrets.GIST_TOKEN }}
                    # One gist shared by both profiling jobs, across every PR:
                    # https://gist.github.com/flatland-competition/6f2b1d5d6e3ee80f57edab68215a05ef
                    GIST_ID: 6f2b1d5d6e3ee80f57edab68215a05ef
                    PR_SHA: ${{ github.event.pull_request.head.sha }}
                run: |
                    short_sha=${PR_SHA:0:7}
                    # Named per PR only (not per commit) - the PR number already disambiguates within the
                    # shared gist, so each new commit on a PR safely overwrites that PR's own file.
                    filename="pr${{ github.event.pull_request.number }}_performance_get_k_shortest_paths.png"
                    # `gh gist create` rejects binary files outright, and the gists API's `content` field is
                    # text-only - so we go through git directly (a gist is just a git repo under the hood,
                    # which accepts binary content fine).
                    git clone "https://$GH_TOKEN@gist.github.com/$GIST_ID.git" gist_dir
                    # gist.github.com redirects the clone URL (e.g. to add a trailing slash), and git drops
                    # the embedded token from the remote URL when it follows that redirect - so re-embed it
                    # before pushing, otherwise push fails non-interactively ("could not read Username").
                    git -C gist_dir remote set-url origin "https://$GH_TOKEN@gist.github.com/$GIST_ID.git"
                    cp benchmarks/performance_get_k_shortest_paths.png "gist_dir/$filename"
                    git -C gist_dir -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
                        add "$filename"
                    git -C gist_dir -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
                        commit --allow-empty -m "Add profiling png for PR #${{ github.event.pull_request.number }}, $PR_SHA"
                    git -C gist_dir push
                    raw_url=$(gh api "gists/$GIST_ID" --jq ".files[\"$filename\"].raw_url")
                    echo "url=https://gist.github.com/$GIST_ID" >> "$GITHUB_OUTPUT"
                    echo "raw_url=$raw_url" >> "$GITHUB_OUTPUT"
                    echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
            -   name: Create or update get_k_shortest_paths profiling comment
                if: >-
                    ${{ github.event_name == 'pull_request' && matrix.python-version == '3.12' &&
                    github.event.pull_request.head.repo.full_name == github.repository }}
                uses: peter-evans/create-or-update-comment@v4
                with:
                    comment-id: ${{ steps.find-comment.outputs.comment-id }}
                    issue-number: ${{ github.event.pull_request.number }}
                    edit-mode: replace
                    body: |
                        <!-- flatland-ci-profiling-get-k-shortest-paths -->
                        ### 📈 `get_k_shortest_paths` profiling (Python 3.12) — commit [`${{ steps.gist.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})

                        ![get_k_shortest_paths profiling](${{ steps.gist.outputs.raw_url }})

                        _Updated by [this workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · [gist](${{ steps.gist.outputs.url }})._

    benchmarks:
        if: ${{ github.event.inputs.run_benchmarks || github.ref == 'refs/heads/main' }}
        runs-on: ubuntu-22.04
        strategy:
            fail-fast: false
            matrix:
                python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        steps:
            -   uses: actions/checkout@v6
            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v6
                with:
                    python-version: ${{ matrix.python-version }}
            -   name: Download episodes
                run: |
                    wget "${{ env.flatland-benchmarks-episodes-url }}" -O FLATLAND_BENCHMARK_EPISODES_FOLDER.zip
                    mkdir -p episodes
                    unzip FLATLAND_BENCHMARK_EPISODES_FOLDER -d episodes
                working-directory: ${{ github.workspace }}
            -   name: Download ecml2026 scenario
                run: wget "${{ env.ecml2026-pkl }}" -O level_0_scenario_1.pkl
                working-directory: ${{ github.workspace }}
            -   name: Install tox
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install tox tox-gh-actions
            -   name: Run benchmarks
                run: tox run -e py${{ matrix.python-version }}-benchmarks
            -   uses: actions/upload-artifact@v6
                with:
                    name: upload-benchmarks-results-${{ matrix.python-version }}
                    path: benchmarks.hprof
                    if-no-files-found: error

    regression:
        if: ${{ github.event.inputs.run_benchmarks || github.ref == 'refs/heads/main' }}
        runs-on: ubuntu-22.04
        strategy:
            fail-fast: false
            matrix:
                python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        steps:
            -   uses: actions/checkout@v6
            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v6
                with:
                    python-version: ${{ matrix.python-version }}
            -   name: Download episodes
                run: |
                    wget "${{ env.flatland-benchmarks-episodes-url }}" -O FLATLAND_BENCHMARK_EPISODES_FOLDER.zip
                    mkdir -p episodes
                    unzip FLATLAND_BENCHMARK_EPISODES_FOLDER -d episodes
                working-directory: ${{ github.workspace }}
            -   name: Clone flatland-baselines
                uses: actions/checkout@v6
                with:
                    repository: flatland-association/flatland-baselines
                    ref: ${{ env.flatland-baselines-ref }}
                    path: flatland-baselines
            -   name: Install tox
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install tox tox-gh-actions
            -   name: Run benchmarks
                run: tox run -e py${{ matrix.python-version }}-regression
