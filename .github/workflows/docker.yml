name: Build and publish Docker image

on:
    workflow_dispatch:
    push:
        branches: [ "main" ]
    pull_request:
    schedule:
        -   cron: '0 3 * * *'

env:
    REGISTRY: ghcr.io

jobs:
    docker-publish:
        runs-on: ubuntu-22.04
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                python-version: [ "3.12" ]
                variant:
                    -   name: default
                        with-ml: "false"
                        tag-suffix: ""
                    -   name: ml
                        with-ml: "true"
                        tag-suffix: "-ml"
        steps:
            -   name: Checkout
                uses: actions/checkout@v6
            -   name: Log in to GHCR
                if: ${{ github.event_name != 'pull_request' }}
                uses: docker/login-action@v3
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3
            -   name: Build image name
                id: image-name
                run: echo "IMAGE_NAME=$(echo '${{ env.REGISTRY }}/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
            -   name: Build and push image
                uses: docker/build-push-action@v6
                with:
                    context: .
                    build-args: |
                        PYTHON_VERSION=${{ matrix.python-version }}
                        WITH_ML=${{ matrix.variant.with-ml }}
                    push: ${{ github.event_name != 'pull_request' }}
                    tags: ${{ steps.image-name.outputs.IMAGE_NAME }}:latest-py${{ matrix.python-version }}${{ matrix.variant.tag-suffix }}
                    cache-from: type=gha,scope=python-${{ matrix.python-version }}-${{ matrix.variant.name }}
                    cache-to: type=gha,mode=max,scope=python-${{ matrix.python-version }}-${{ matrix.variant.name }}
