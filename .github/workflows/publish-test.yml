name: Publish package to Test PyPI

env:
    # DEPENDENCY SWITCH:
    flatland-baselines-ref: main
    flatland-benchmarks-episodes-url: "https://github.com/flatland-association/flatland-scenarios/raw/refs/heads/main/trajectories/FLATLAND_BENCHMARK_EPISODES_FOLDER_v5.zip"

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Version number"
                required: true
                type: string

jobs:
    publish:
        runs-on: ubuntu-22.04
        steps:
            -   name: Checkout
                uses: actions/checkout@v6
                with:
                    fetch-depth: 0
            -   name: Set up Python
                uses: actions/setup-python@v6
                with:
                    python-version: "3.13"
            -   name: Download episodes
                run: |
                    wget "https://github.com/flatland-association/flatland-scenarios/raw/refs/heads/main/trajectories/FLATLAND_BENCHMARK_EPISODES_FOLDER_v4.zip" -O FLATLAND_BENCHMARK_EPISODES_FOLDER.zip
                    mkdir -p episodes
                    unzip FLATLAND_BENCHMARK_EPISODES_FOLDER -d episodes
            -   name: Clone flatland-baselines
                run: |
                    set -euxo pipefail
                    git clone -b ${{ env.flatland-baselines-ref }} https://github.com/flatland-association/flatland-baselines.git
                    cd flatland-baselines
                    git remote show origin
                    git status
                    git branch
            -   name: Install tox
                run: |
                    python -m pip install --upgrade pip
                    pip install tox tox-gh-actions
            -   name: Tag commit with version
                env:
                    VERSION: ${{ inputs.version }}
                run: git tag v$VERSION
            -   name: Build new package
                run: tox run -e build
            -   name: Verify dist is pure Python
                run: python scripts/verify_cython_extension_build.py --dist-dir dist --expect pure-python
            -   name: Publish package to PyPI
                uses: pypa/gh-action-pypi-publish@release/v1
                with:
                    password: ${{ secrets.PYPI_TEST_API_TOKEN }}
                    repository-url: https://test.pypi.org/legacy/
            -   name: Archive package
                uses: actions/upload-artifact@v6
                with:
                    name: python-package
                    path: dist/

    docker-publish:
        runs-on: ubuntu-22.04
        needs: [ publish ]
        permissions:
            contents: read
            packages: write
        env:
            REGISTRY: ghcr.io
        strategy:
            fail-fast: false
            matrix:
                python-version: [ "3.12" ]
                variant:
                    -   name: default
                        with-ml: "false"
                        tag-suffix: ""
                    -   name: ml
                        with-ml: "true"
                        tag-suffix: "-ml"
        steps:
            -   name: Checkout
                uses: actions/checkout@v6
            -   name: Log in to GHCR
                uses: docker/login-action@v3
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Set up QEMU
                uses: docker/setup-qemu-action@v3
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3
            -   name: Build image name
                id: image-name
                run: echo "IMAGE_NAME=$(echo '${{ env.REGISTRY }}/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
            -   name: Build and push image
                uses: docker/build-push-action@v6
                with:
                    context: .
                    platforms: linux/amd64,linux/arm64
                    build-args: |
                        PYTHON_VERSION=${{ matrix.python-version }}
                        WITH_ML=${{ matrix.variant.with-ml }}
                        FLATLAND_RL_REF=${{ github.ref_name }}
                    no-cache: true
                    push: true
                    tags: ${{ steps.image-name.outputs.IMAGE_NAME }}:v${{ inputs.version }}-py${{ matrix.python-version }}${{ matrix.variant.tag-suffix }}
